<!DOCTYPE html>

<html>
	<head>
		<link rel="stylesheet" type="text/css" href="static/style.css">
	</head>

	<body>
		<div align="center">
			<h1>Art decoder/encoder</h1>
			<p>
				A tool for compressing/decompressing ASCII art.<br>
				Instructions and source on <a href="https://github.com/tossudev/art-decoder-interface" target="_blank">Github.</a><br>
				<br>
				{{.HttpResponseText}}<br>
			</p>

			<p style="color: red;">{{.ErrorMessage}}</p>
			<p style="color: green;">{{.InfoMessage}}</p>

			<form method="POST" action="/decoder">
				<textarea name="input" rows="40" cols="80">{{.Input}}</textarea>
				
				<div>
					<input type="submit" name="action" value="Decode">
					<input type="submit" name="action" value="Encode">
				</div>

			</form>

			<textarea name="output" rows="40" cols="80">{{.Output}}</textarea>
		</div>
	</body>

</html>
